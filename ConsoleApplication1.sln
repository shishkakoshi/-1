#include <iostream>
#include <string>
#include <algorithm>

using namespace std;

// сложение в двоичной сс
string twoSum(string a, string b) {
    string result = "";
    int carry = 0; // переносимое число (остаточек)

    // выравание кол-ва знаков в дс, чтобы совпадали разряды
    while (a.length() < b.length()) a = "0" + a;
    while (b.length() < a.length()) b = "0" + b;

    // складываем с конца
    for (int i = a.length() - 1; i >= 0; i--) {
        int bitA = a[i] - '0';
        int bitB = b[i] - '0';

        int sum = bitA + bitB + carry;

        if (sum == 0) {
            result = "0" + result;
            carry = 0;
        }
        else if (sum == 1) {
            result = "1" + result;
            carry = 0;
        }
        else if (sum == 2) {
            result = "0" + result;
            carry = 1;
        }
        else if (sum == 3) {
            result = "1" + result;
            carry = 1;
        }
    }

    if (carry == 1) {
        result = "1" + result;
    }

    return result;
}

// вычитание в двоичной системе
string binarySub(string a, string b) {
    string result = "";
    int borrow = 0; // заем

    // выравнивание по разрядам
    while (a.length() < b.length()) a = "0" + a;
    while (b.length() < a.length()) b = "0" + b;

    // вычитаем с конца
    for (int i = a.length() - 1; i >= 0; i--) {
        int bitA = a[i] - '0';
        int bitB = b[i] - '0';

        // - заем от большего при нехватке 
        bitA = bitA - borrow;

        if (bitA >= bitB) {
            result = to_string(bitA - bitB) + result;
            borrow = 0;
        }
        else {
            result = to_string(bitA + 2 - bitB) + result;
            borrow = 1;
        }
    }

    return result;
}

// сложение в восьмеричной сис
string octalSum(string a, string b) {
    string result = "";
    int carry = 0;

    while (a.length() < b.length()) a = "0" + a;
    while (b.length() < a.length()) b = "0" + b;

    // складываем с конца
    for (int i = a.length() - 1; i >= 0; i--) {
        int dA = a[i] - '0';
        int dB = b[i] - '0';

        int sum = dA + dB + carry;

        if (sum < 8) {
            result = to_string(sum) + result;
            carry = 0;
        }
        else {
            result = to_string(sum - 8) + result;
            carry = 1;
        }
    }

    if (carry == 1) {
        result = "1" + result;
    }

    return result;
}

// вычитание в восьмеричной сис 
string octalSub(string a, string b) {
    string result = "";
    int borrow = 0;

    while (a.length() < b.length()) a = "0" + a;
    while (b.length() < a.length()) b = "0" + b;

    for (int i = a.length() - 1; i >= 0; i--) {
        int digA = a[i] - '0';
        int digB = b[i] - '0';

        digA = digA - borrow;

        if (digA >= digB) {
            result = to_string(digA - digB) + result;
            borrow = 0;
        }
        else {
            result = to_string(digA + 8 - digB) + result;
            borrow = 1;
        }
    }

    return result;
}


int main() {
    setlocale(LC_ALL, "Russian");

    int vibor;
    string chislo1, chislo2;

    cout << "выбор системы счисления" << endl;
    cout << "2 - двоичная система" << endl;
    cout << "8 - восьмеричная система" << endl;
    cin >> vibor;

    if (vibor == 2) {
        cout << "двочианя система" << endl;
        cout << "введи первое число: ";
        cin >> chislo1;
        cout << "введи второе число: ";
        cin >> chislo2;

        // сложение
        string binSum = twoSum(chislo1, chislo2);
        cout << "\n" << chislo1 << " + " << chislo2 << " = " << binSum << endl;

        // вычитаем
        string binSub = binarySub(chislo1, chislo2);
        cout << chislo1 << " - " << chislo2 << " = " << binSub << endl;
    }
    else if (vibor == 8) {
        cout << "\nвосьмеричная система" << endl;
        cout << "введи первое число: ";
        cin >> chislo1;
        cout << "введи второе число: ";
        cin >> chislo2;

        // складываем
        string octSum = octalSum(chislo1, chislo2);
        cout << "\n" << chislo1 << " + " << chislo2 << " = " << octSum << endl;

        // вычитаем
        string octSub = octalSub(chislo1, chislo2);
        cout << chislo1 << " - " << chislo2 << " = " << octSub << endl;
    }
    else {
        cout << "ошибка, нужно выбрать 2 или 8" << endl;
    }

    // Спрашиваем, хочет ли пользователь попробовать еще раз
    cout << "\nпродолжить... (1 - да, 2 - нет): ";
    cin >> vibor;

    if (vibor == 1) {
        cout << "\n";
        main(); // запускаем заново
    }
    else {
        cout << "пока!" << endl;
    }

    return 0;
}

